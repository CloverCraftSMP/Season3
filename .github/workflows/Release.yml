name: Release
run-name: "Release #${{ github.run_number }}"

on:
  workflow_call:
    inputs:
      projectname:
        required: true
        type: string
      projectsuffix:
        required: true
        type: string
      tag:
        required: true
        type: string
      rel_type:
        required: true
        type: string
      mcversion:
        required: true
        type: string
      news:
        required: true
        type: string

env:
  MR_PROJECT_ID: "Ds1KOhlV"

jobs:
  release-github:
    name: GitHub Release
    runs-on: self-hosted
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          body_path: /tmp/modpack-builds/CHANGELOG-${{ inputs.projectsuffix }}.md
          files: |
            /tmp/modpack-builds/${{ inputs.projectname }}-${{ inputs.projectsuffix }}.mrpack
            /tmp/modpack-builds/${{ inputs.projectname }}-${{ inputs.projectsuffix }}-Server-Pack.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

