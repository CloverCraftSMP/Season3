  #           ### What's new?
  #           ${{ inputs.news }}
  #         embeds: "[{}]"

  update-changelogs:
    name: Update Changelogs
    runs-on: self-hosted
    # needs: [release-github, release-modrinth]
    needs: [release-github]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Retrieve changelog locally
        run: |
          mkdir -p .github/changelogs
          cp /tmp/modpack-builds/CHANGELOG-${{ inputs.projectsuffix }}.md .github/changelogs/

      - name: Reset CHANGELOG.md from template
        # The processed changelog is archived under .github/changelogs/,
        # and CHANGELOG.md is reset to the template for the next release.
        run: cp .github/CHANGELOG_TEMPLATE.md CHANGELOG.md

      - name: Commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update changelogs for ${{ inputs.projectsuffix }}"

      - name: Push
        uses: ad-m/github-push-action@v1.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  close-fixed-issues:
    name: Close Fixed Issues
    runs-on: self-hosted
    # needs: [release-github, release-modrinth]
    needs: [release-github]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Close issues labeled "fixed in dev"
        uses: juraj-hrivnak/close-issues-based-on-label@master
        env:
          LABEL: "fixed in dev"
          VERSION: ${{ inputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}