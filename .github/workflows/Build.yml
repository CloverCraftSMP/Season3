name: Build
run-name: "Build #${{ github.run_number }}"
 
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
 
jobs:
  modpack-info:
    name: Modpack Info
    runs-on: self-hosted
    outputs:
      projectname:   ${{ steps.info.outputs.projectname }}
      projectsuffix: ${{ steps.info.outputs.projectsuffix }}
      mcversion:     ${{ steps.info.outputs.mcversion }}
      tag:           ${{ steps.info.outputs.tag }}
      rel_type:      ${{ steps.info.outputs.rel_type }}
      news:          ${{ steps.info.outputs.news }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git describe and diff
 
      - name: Get modpack info
        id: info
        run: bash .github/scripts/get_modpack_info.sh
 
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG-${{ steps.info.outputs.projectsuffix }}.md
 
  build:
    name: Build Modpack
    runs-on: self-hosted
    needs: [modpack-info]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
 
      - name: Download Pakku
        run: |
          PAKKU_VERSION=$(curl -sSL https://api.github.com/repos/juraj-hrivnak/Pakku/releases/latest | jq -r .tag_name)
          curl -sSL "https://github.com/juraj-hrivnak/Pakku/releases/download/${PAKKU_VERSION}/pakku.jar" -o pakku.jar
 
      - name: Set pack version
        # On tagged releases, stamp the lock file with the tag version so
        # the exported filenames and mrpack metadata reflect the release.
        if: startsWith(github.ref, 'refs/tags/v')
        run: java -jar pakku.jar set --version "${{ needs.modpack-info.outputs.projectsuffix }}"
 
      - name: Inject modpack version into configs
        run: |
          VERSION="${{ needs.modpack-info.outputs.projectsuffix }}"
          echo "Injecting version $VERSION..."
          grep -rl "@modpack_version@" overrides/ | while read -r file; do
            sed -i "s/@modpack_version@/$VERSION/g" "$file"
            echo "  ✔ $file"
          done
 
      - name: Export modpack
        # Produces:
        #   build/modrinth/<name>-<version>.mrpack
        #   build/serverpack/<name>-<version>.zip
        run: java -jar pakku.jar export
 
      - name: Stage artifacts
        # Rename to the consistent suffix so downstream jobs can reference them by name
        run: |
          NAME="${{ needs.modpack-info.outputs.projectname }}"
          SUFFIX="${{ needs.modpack-info.outputs.projectsuffix }}"
          mv build/modrinth/*.mrpack   "${NAME}-${SUFFIX}.mrpack"
          mv build/serverpack/*.zip    "${NAME}-${SUFFIX}-Server-Pack.zip"
 
      - name: Upload mrpack
        uses: actions/upload-artifact@v4
        with:
          name: mrpack
          path: "*.mrpack"
 
      - name: Upload serverpack
        uses: actions/upload-artifact@v4
        with:
          name: serverpack
          path: "*-Server-Pack.zip"
 
  release:
    name: Release
    needs: [modpack-info, build]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
    permissions:
      contents: write
    uses: ./.github/workflows/Release.yml
    with:
      projectname:   ${{ needs.modpack-info.outputs.projectname }}
      projectsuffix: ${{ needs.modpack-info.outputs.projectsuffix }}
      mcversion:     ${{ needs.modpack-info.outputs.mcversion }}
      tag:           ${{ needs.modpack-info.outputs.tag }}
      rel_type:      ${{ needs.modpack-info.outputs.rel_type }}
      news:          ${{ needs.modpack-info.outputs.news }}
    secrets: inherit
